# Experiment 2: Per-Phase Model Assignment — Arm S (strawman)
# IV: Model assignment policy
# Config: Haiku 4.5 for ALL phases including execute
# Override: every phase → claude-haiku-4-5 (cost floor baseline)

[pipeline]
name = "experiment-modelassign-armS"
spec_phases = ["plan-critique", "spec-critique", "critic"]
task_phases = ["execute", "task-verify"]
post_phases = []

[phase_overrides.execute]
model = "claude-haiku-4-5"

[phase_overrides.critic]
model = "claude-haiku-4-5"

[phase_overrides.task-verify]
model = "claude-haiku-4-5"

[phase_overrides.plan-critique]
model = "claude-haiku-4-5"

[phase_overrides.spec-critique]
model = "claude-haiku-4-5"

[phase_overrides.doc-update]
model = "claude-haiku-4-5"
