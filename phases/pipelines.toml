# BOI pipeline modes. Each [mode.X] declares explicit phase ordering.
# spec_pre_phases  — run once before tasks (e.g. spec planning, critique)
# spec_post_phases — run once after all tasks complete (e.g. critic, merge, cleanup)
# task_phases      — run per task in order
# max_loops        — cap on spec_pre_phases ↔ on_reject:requeue iterations (default 3)
#
# Migrated 2026-05-12 from legacy `spec_phases` (which relied on a magic-string
# fallback in worker.rs to split into pre/post by name). All modes now declare
# the split explicitly. See docs/phase-configurability-2026-05-12.md for context.

[mode.default]
spec_pre_phases  = ["spec-critique", "spec-improve"]
spec_post_phases = ["critic"]
task_phases      = ["execute", "task-verify"]
max_loops        = 1

[mode.challenge]
spec_pre_phases  = ["plan-critique"]
spec_post_phases = ["critic"]
task_phases      = ["execute", "task-verify"]

[mode.discover]
spec_pre_phases  = []
spec_post_phases = ["critic", "evaluate"]
task_phases      = ["execute", "task-verify"]

[mode.generate]
spec_pre_phases  = ["plan-critique"]
spec_post_phases = ["critic", "evaluate"]
# doc-update intentionally excluded: generate mode produces prose/design documents,
# not code. doc-update is a code-maintenance phase (updates API docs, changelogs,
# README) and has no meaningful work to do on a document-generation spec.
# Historical SA9EE logs showed it running because the pre-2026-05-12 pipeline had
# a different shape; the migration removed it. If a generate spec also writes code,
# use phase_overrides to add doc-update for that task explicitly.
task_phases      = ["decompose", "execute", "code-review", "task-verify"]

[mode.v2]
spec_pre_phases  = ["spec-critique", "spec-improve"]
task_phases      = ["execute", "review", "commit"]
spec_post_phases = ["doc-update", "critic", "merge", "cleanup"]
max_loops        = 3
