[mode.default]
spec_phases = ["critic"]
task_phases = ["execute", "task-verify"]

[mode.challenge]
spec_phases = ["plan-critique", "critic"]
task_phases = ["execute", "task-verify"]

[mode.discover]
spec_phases = ["critic", "evaluate"]
task_phases = ["execute", "task-verify"]

[mode.generate]
spec_phases = ["plan-critique", "critic", "evaluate"]
task_phases = ["decompose", "execute", "code-review", "task-verify"]
