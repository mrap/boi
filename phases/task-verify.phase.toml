name = "task-verify"
description = "Run verify commands to confirm task work is correct"
completion_handler = "builtin:task-verify"

[phase]
name = "task-verify"
level = "task"
can_add_tasks = false
can_fail_spec = false
requires_claude = false

[worker]
timeout = 30

[completion]
approve_signal = "## Task Verification Approved"
reject_signal = "[TASK-VERIFY]"
on_approve = "next"
on_reject = "requeue:execute"
on_crash = "retry"

[hooks]
pre = []
post = []
