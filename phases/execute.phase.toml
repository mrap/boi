name = "execute"
description = "Execute tasks from the spec using a worker agent"
completion_handler = "builtin:execute"

[phase]
level = "task"
can_add_tasks = false
can_fail_spec = false

[worker]
runtime = "claude"
model = "claude-sonnet-4-6"
prompt_template = "templates/worker-prompt.md"
effort = "medium"
timeout = 600

[completion]
approve_signal = ""
