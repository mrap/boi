name = "spec-critique"
description = "Critique spec quality before execution: catch non-executable verifies, unbounded scope, missing dependencies, and implicit assumptions"

[phase]
name = "spec-critique"
description = "Critique spec quality before execution"
level = "spec"
timeout_minutes = 2
can_add_tasks = false
can_fail_spec = false
requires_claude = true

[worker]
runtime = "claude"
model = "claude-sonnet-4-6"
prompt_template = "templates/spec-critique-prompt.md"
effort = "medium"
timeout = 120

[completion]
approve_signal = "## Spec Approved"
reject_signal = "[CRITIQUE]"
on_approve = "next"
on_reject = "requeue:spec-improve"
on_crash = "retry"

[hooks]
pre = []
post = []
