name = "spec-review"
description = "Review and improve spec quality before execution"

[phase]
name = "spec-review"
description = "Review and improve spec quality before execution"
level = "spec"
timeout_minutes = 2
can_add_tasks = true
can_fail_spec = false
requires_claude = true

[worker]
runtime = "claude"
model = "claude-sonnet-4-6"
prompt_template = "templates/spec-review-prompt.md"
effort = "medium"
timeout = 120

[completion]
approve_signal = "## Spec Review Complete"
on_approve = "next"
on_crash = "retry"

[hooks]
pre = []
post = []
