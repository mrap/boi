name = "code-review"
description = "4-persona code review: quality, testing, security, and architecture -- only runs when >50 lines changed"

[phase]
level = "task"
can_add_tasks = true
can_fail_spec = false

[worker]
runtime = "claude"
model = "claude-sonnet-4-6"
prompt_template = "templates/code-review-prompt.md"
effort = "high"
timeout = 600

[completion]
approve_signal = "## Code Review Approved"
# Use a delimited token that cannot appear in task-heading prefixes (chosen over
# structural line-match because it requires no changes to the detection code in
# src/phases.rs — the existing `output.contains(signal)` check is correct for a
# unique sentinel that the LLM emits only on rejection).
reject_signal = "<<CODE-REVIEW-REJECT>>"
on_approve = "next"
on_reject = "requeue:execute"
on_crash = "retry"

[trigger]
min_lines_changed = 50

[hooks]
pre = []
post = []
