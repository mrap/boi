name = "critic"
description = "Review completed work for quality, correctness, and spec compliance"
completion_handler = "builtin:critic"

[worker]
runtime = "hermes"
model = "moonshotai/kimi-k2.5"
prompt_template = "templates/critic-worker-prompt.md"
effort = "high"
timeout = 300

[completion]
approve_signal = "## Critic Approved"
reject_signal = "[CRITIC]"
on_approve = "next"
on_reject = "requeue:execute"
on_crash = "retry"

[hooks]
pre = []
post = []
