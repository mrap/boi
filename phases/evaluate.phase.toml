name = "evaluate"
description = "Evaluate spec completion and determine next steps"
completion_handler = "builtin:evaluate"

[phase]
level = "spec"
can_add_tasks = true
can_fail_spec = false

[worker]
runtime = "claude"
model = "claude-sonnet-4-6"
prompt_template = "templates/evaluate-prompt.md"
effort = "medium"
timeout = 300

[completion]
approve_signal = ""
