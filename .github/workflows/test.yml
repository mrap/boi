name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: python3 -m pip install pytest

      - name: Run unit tests
        run: python3 -m pytest tests/ -v --ignore=tests/integration_boi.py --ignore=tests/eval_boi.py

      - name: Run integration tests
        run: python3 -m unittest tests.integration_boi -v

      - name: Run eval tests
        run: python3 -m unittest tests.eval_boi -v
