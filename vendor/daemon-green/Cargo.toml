[package]
name = "daemon-green"
version = "0.1.0"
edition = "2021"
description = "Cross-platform per-user background service manager (launchd gui-agent / systemd --user), login-session aware, sudo-free, SSH-safe."
license = "MIT OR Apache-2.0"
# This is the vendored copy consumed via a local path dependency from the
# parent crate's Cargo.toml; see vendor/daemon-green/README.md.
repository = "https://github.com/mrap/daemon-green"

[lib]
name = "daemon_green"
path = "src/lib.rs"

# std-only: backends shell out to launchctl / systemctl. No external deps.
[dependencies]

[dev-dependencies]
